name: JetBrains Plugin Windows Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'jetbrains/**'
      - '.github/workflows/jetbrains-windows-build.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
  pull_request:
    paths:
      - 'jetbrains/**'
      - '.github/workflows/jetbrains-windows-build.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'

env:
  PNPM_VERSION: 10.8.1
  NODE_VERSION: 20.20.0

jobs:
  build-jetbrains-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          lfs: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-store
        shell: pwsh
        run: |
          $storePath = pnpm store path --silent
          "STORE_PATH=$storePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore pnpm store cache
        id: pnpm-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          check-latest: false

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Turbo cache setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install

      - name: Save pnpm store cache
        if: ${{ always() && steps.pnpm-cache-restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Prepare JetBrains plugin version files
        run: pnpm --filter @kilo-code/jetbrains-plugin run sync:version

      - name: Build JetBrains plugin bundle
        shell: bash
        run: pnpm run jetbrains:bundle

      - name: Upload JetBrains plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: jetbrains-plugin-windows
          path: jetbrains/plugin/build/distributions/*
          if-no-files-found: error
